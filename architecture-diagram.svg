<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#232f3e">
    AWS Project 2: High Availability Web Application Architecture
  </text>
  
  <!-- Internet Users Layer -->
  <g id="users">
    <rect x="350" y="80" width="500" height="60" fill="#FF9900" rx="5"/>
    <text x="600" y="120" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      Internet Users / Visitors
    </text>
  </g>
  
  <!-- ALB Layer -->
  <g id="alb">
    <rect x="300" y="180" width="600" height="100" fill="#FF9900" rx="5" stroke="#232f3e" stroke-width="2"/>
    <text x="600" y="215" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Application Load Balancer (ALB)
    </text>
    <text x="600" y="240" font-size="12" text-anchor="middle" fill="white">
      projekt2-alb • HTTP Port 80 • Health Checks Every 30s
    </text>
    <text x="600" y="260" font-size="11" text-anchor="middle" fill="white">
      DNS: projekt2-alb-341637141.eu-central-1.elb.amazonaws.com
    </text>
  </g>
  
  <!-- Arrow from users to ALB -->
  <path d="M 600 140 L 600 180" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- EC2 Instances Layer -->
  <g id="ec2-a">
    <!-- AZ-A Box -->
    <rect x="100" y="320" width="350" height="200" fill="#e8f4f8" rx="5" stroke="#232f3e" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="275" y="345" font-size="14" font-weight="bold" text-anchor="middle" fill="#232f3e">
      Availability Zone: eu-central-1a
    </text>
    
    <!-- EC2 Server 1 -->
    <rect x="120" y="360" width="310" height="130" fill="#FF9900" rx="5" stroke="#232f3e" stroke-width="2"/>
    <text x="275" y="390" font-size="13" font-weight="bold" text-anchor="middle" fill="white">
      EC2 Instance (Server 1)
    </text>
    <text x="275" y="410" font-size="11" text-anchor="middle" fill="white">
      Instance Type: t2.micro (Free Tier)
    </text>
    <text x="275" y="428" font-size="11" text-anchor="middle" fill="white">
      OS: Amazon Linux 2
    </text>
    <text x="275" y="446" font-size="11" text-anchor="middle" fill="white">
      Web Server: Apache 2.4 (Port 80)
    </text>
    <text x="275" y="464" font-size="10" text-anchor="middle" fill="white">
      Security Group: projekt2-sg
    </text>
  </g>
  
  <g id="ec2-b">
    <!-- AZ-B Box -->
    <rect x="750" y="320" width="350" height="200" fill="#e8f4f8" rx="5" stroke="#232f3e" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="925" y="345" font-size="14" font-weight="bold" text-anchor="middle" fill="#232f3e">
      Availability Zone: eu-central-1b
    </text>
    
    <!-- EC2 Server 2 -->
    <rect x="770" y="360" width="310" height="130" fill="#FF9900" rx="5" stroke="#232f3e" stroke-width="2"/>
    <text x="925" y="390" font-size="13" font-weight="bold" text-anchor="middle" fill="white">
      EC2 Instance (Server 2)
    </text>
    <text x="925" y="410" font-size="11" text-anchor="middle" fill="white">
      Instance Type: t2.micro (Free Tier)
    </text>
    <text x="925" y="428" font-size="11" text-anchor="middle" fill="white">
      OS: Amazon Linux 2
    </text>
    <text x="925" y="446" font-size="11" text-anchor="middle" fill="white">
      Web Server: Apache 2.4 (Port 80)
    </text>
    <text x="925" y="464" font-size="10" text-anchor="middle" fill="white">
      Security Group: projekt2-sg
    </text>
  </g>
  
  <!-- Arrows from ALB to EC2s -->
  <path d="M 450 280 L 275 360" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 750 280 L 925 360" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Target Group Box -->
  <g id="target-group">
    <rect x="350" y="550" width="500" height="70" fill="#4B612C" rx="5" stroke="#232f3e" stroke-width="2"/>
    <text x="600" y="580" font-size="13" font-weight="bold" text-anchor="middle" fill="white">
      Target Group: projekt2-tg
    </text>
    <text x="600" y="600" font-size="11" text-anchor="middle" fill="white">
      HTTP Port 80 | Registers EC2 instances from ASG
    </text>
  </g>
  
  <!-- Arrows from EC2s to Target Group -->
  <path d="M 275 490 L 450 550" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 925 490 L 750 550" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Auto Scaling Group -->
  <g id="asg">
    <rect x="300" y="650" width="600" height="90" fill="#2E73B7" rx="5" stroke="#232f3e" stroke-width="2"/>
    <text x="600" y="680" font-size="13" font-weight="bold" text-anchor="middle" fill="white">
      Auto Scaling Group: projekt2-asg
    </text>
    <text x="600" y="700" font-size="11" text-anchor="middle" fill="white">
      Desired: 2 | Min: 2 | Max: 4 | Launches from Launch Template
    </text>
    <text x="600" y="720" font-size="10" text-anchor="middle" fill="white">
      Scales based on CPU utilization (>70% scale up, <30% scale down)
    </text>
  </g>
  
  <!-- Arrow from Target Group to ASG -->
  <path d="M 600 620 L 600 650" stroke="#232f3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- VPC -->
  <g id="vpc">
    <rect x="200" y="770" width="800" height="100" fill="none" stroke="#232f3e" stroke-width="3" stroke-dasharray="10,5" rx="5"/>
    <text x="1000" y="795" font-size="12" font-weight="bold" fill="#232f3e">
      VPC: 10.0.0.0/16
    </text>
    <text x="1000" y="815" font-size="11" fill="#232f3e">
      • 2 Public Subnets (Web Tier)
    </text>
    <text x="1000" y="835" font-size="11" fill="#232f3e">
      • 2 Private Subnets (Future DB)
    </text>
    <text x="1000" y="855" font-size="11" fill="#232f3e">
      • Internet Gateway
    </text>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="50" width="200" height="100" fill="white" stroke="#232f3e" stroke-width="1" rx="3"/>
    <text x="60" y="70" font-size="11" font-weight="bold" fill="#232f3e">
      Legend:
    </text>
    <circle cx="65" cy="88" r="4" fill="#FF9900"/>
    <text x="75" y="92" font-size="10" fill="#232f3e">
      AWS Services
    </text>
    <rect x="65" y="105" width="8" height="8" fill="none" stroke="#232f3e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="75" y="112" font-size="10" fill="#232f3e">
      Boundaries
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#232f3e"/>
    </marker>
  </defs>
  
  <!-- Key Features Box -->
  <g id="features">
    <rect x="50" y="170" width="200" height="180" fill="white" stroke="#232f3e" stroke-width="1" rx="3"/>
    <text x="60" y="190" font-size="11" font-weight="bold" fill="#232f3e">
      Key Features:
    </text>
    <text x="60" y="210" font-size="9" fill="#232f3e">
      ✓ Multi-AZ (99.99%)
    </text>
    <text x="60" y="228" font-size="9" fill="#232f3e">
      ✓ Auto Scaling
    </text>
    <text x="60" y="246" font-size="9" fill="#232f3e">
      ✓ Load Balancing
    </text>
    <text x="60" y="264" font-size="9" fill="#232f3e">
      ✓ Health Checks
    </text>
    <text x="60" y="282" font-size="9" fill="#232f3e">
      ✓ Fault Tolerance
    </text>
    <text x="60" y="300" font-size="9" fill="#232f3e">
      ✓ Free Tier Compatible
    </text>
    <text x="60" y="318" font-size="9" fill="#232f3e">
      ✓ Production-Grade
    </text>
    <text x="60" y="336" font-size="9" fill="#232f3e">
      ✓ Cost Optimized
    </text>
  </g>
</svg>
