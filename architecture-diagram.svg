<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="800" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="500" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#232f3e">
    AWS Project 2: High Availability Web Application
  </text>
  
  <!-- Internet Users -->
  <rect x="250" y="60" width="500" height="50" fill="#FF9900" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="500" y="90" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Internet Users / Visitors
  </text>
  
  <!-- ALB -->
  <rect x="200" y="140" width="600" height="80" fill="#FF9900" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="500" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Application Load Balancer (ALB)
  </text>
  <text x="500" y="185" font-size="10" text-anchor="middle" fill="white">
    projekt2-alb • HTTP Port 80 • Health Checks
  </text>
  <text x="500" y="200" font-size="10" text-anchor="middle" fill="white">
    DNS: projekt2-alb-341637141.eu-central-1.elb.amazonaws.com
  </text>
  
  <!-- Arrow Internet to ALB -->
  <path d="M 500 110 L 500 140" stroke="#232f3e" stroke-width="2" fill="none"/>
  
  <!-- AZ-A Container -->
  <rect x="50" y="250" width="350" height="180" fill="none" stroke="#232f3e" stroke-width="2" stroke-dasharray="5,5" rx="5"/>
  <text x="225" y="270" font-weight="bold" fill="#232f3e" text-anchor="middle" font-size="12">
    Availability Zone: eu-central-1a
  </text>
  
  <!-- EC2 Server 1 -->
  <rect x="70" y="285" width="310" height="130" fill="#FF9900" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="225" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    EC2 Instance (Server 1)
  </text>
  <text x="225" y="330" font-size="10" text-anchor="middle" fill="white">
    t2.micro - Amazon Linux 2
  </text>
  <text x="225" y="348" font-size="10" text-anchor="middle" fill="white">
    Apache 2.4 - Port 80
  </text>
  <text x="225" y="366" font-size="10" text-anchor="middle" fill="white">
    Security Group: projekt2-sg
  </text>
  
  <!-- AZ-B Container -->
  <rect x="600" y="250" width="350" height="180" fill="none" stroke="#232f3e" stroke-width="2" stroke-dasharray="5,5" rx="5"/>
  <text x="775" y="270" font-weight="bold" fill="#232f3e" text-anchor="middle" font-size="12">
    Availability Zone: eu-central-1b
  </text>
  
  <!-- EC2 Server 2 -->
  <rect x="620" y="285" width="310" height="130" fill="#FF9900" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="775" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    EC2 Instance (Server 2)
  </text>
  <text x="775" y="330" font-size="10" text-anchor="middle" fill="white">
    t2.micro - Amazon Linux 2
  </text>
  <text x="775" y="348" font-size="10" text-anchor="middle" fill="white">
    Apache 2.4 - Port 80
  </text>
  <text x="775" y="366" font-size="10" text-anchor="middle" fill="white">
    Security Group: projekt2-sg
  </text>
  
  <!-- Arrows ALB to Servers -->
  <path d="M 350 220 L 225 285" stroke="#232f3e" stroke-width="2" fill="none"/>
  <path d="M 650 220 L 775 285" stroke="#232f3e" stroke-width="2" fill="none"/>
  
  <!-- Target Group -->
  <rect x="250" y="460" width="500" height="60" fill="#4B612C" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="500" y="485" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Target Group: projekt2-tg
  </text>
  <text x="500" y="505" font-size="10" text-anchor="middle" fill="white">
    HTTP Port 80 - Auto-registered by ASG
  </text>
  
  <!-- Arrows Servers to Target Group -->
  <path d="M 225 415 L 350 460" stroke="#232f3e" stroke-width="2" fill="none"/>
  <path d="M 775 415 L 650 460" stroke="#232f3e" stroke-width="2" fill="none"/>
  
  <!-- Auto Scaling Group -->
  <rect x="200" y="550" width="600" height="80" fill="#2E73B7" stroke="#232f3e" stroke-width="2" rx="5"/>
  <text x="500" y="575" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Auto Scaling Group: projekt2-asg
  </text>
  <text x="500" y="595" font-size="10" text-anchor="middle" fill="white">
    Min: 2 | Desired: 2 | Max: 4
  </text>
  <text x="500" y="610" font-size="10" text-anchor="middle" fill="white">
    Scales on CPU greater than 70 percent (up) or less than 30 percent (down)
  </text>
  
  <!-- Arrow Target Group to ASG -->
  <path d="M 500 520 L 500 550" stroke="#232f3e" stroke-width="2" fill="none"/>
  
  <!-- VPC -->
  <rect x="150" y="660" width="700" height="100" fill="none" stroke="#232f3e" stroke-width="2" stroke-dasharray="5,5" rx="5"/>
  <text x="500" y="685" font-weight="bold" fill="#232f3e" text-anchor="middle" font-size="12">
    VPC: 10.0.0.0 slash 16
  </text>
  <text x="500" y="705" font-size="10" fill="#232f3e" text-anchor="middle">
    2 Public Subnets (Web Tier) - 2 Private Subnets (Future DB)
  </text>
  <text x="500" y="725" font-size="10" fill="#232f3e" text-anchor="middle">
    Internet Gateway - Route Tables - DNS Enabled
  </text>
  
  <!-- Arrow ASG to VPC -->
  <path d="M 500 630 L 500 660" stroke="#232f3e" stroke-width="2" fill="none"/>
  
  <!-- Key Features Legend -->
  <rect x="30" y="670" width="100" height="100" fill="white" stroke="#232f3e" stroke-width="1" rx="3"/>
  <text x="40" y="688" font-weight="bold" fill="#232f3e" font-size="11">
    Features
  </text>
  <text x="40" y="705" font-size="9" fill="#232f3e">
    Multi-AZ Setup
  </text>
  <text x="40" y="720" font-size="9" fill="#232f3e">
    Auto Scaling
  </text>
  <text x="40" y="735" font-size="9" fill="#232f3e">
    Load Balancing
  </text>
  <text x="40" y="750" font-size="9" fill="#232f3e">
    99.99 percent HA
  </text>
</svg>
